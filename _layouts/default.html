<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.lab.name }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}" />
</head>
<body>

<nav>
  <a class="nav-left" href="{{ '/' | relative_url }}">
    <div class="nav-wordmark">
      <span class="nav-main">Affective Computing Group</span>
      <span class="nav-sub">Vanderbilt University</span>
    </div>
  </a>
  <ul class="nav-links">
    <li><a href="{{ '/' | relative_url }}" {% if page.url == '/' %}class="active"{% endif %}>Home</a></li>
    <li><a href="{{ '/research/' | relative_url }}" {% if page.url contains 'research' %}class="active"{% endif %}>Research</a></li>
    <li><a href="{{ '/people/' | relative_url }}" {% if page.url contains 'people' %}class="active"{% endif %}>People</a></li>
    <li><a href="{{ '/publications/' | relative_url }}" {% if page.url contains 'publications' %}class="active"{% endif %}>Publications</a></li>
    <li><a href="{{ '/contact/' | relative_url }}" {% if page.url contains 'contact' %}class="active"{% endif %}>Contact</a></li>
  </ul>
</nav>

<main>
  {{ content }}
</main>

<footer>
  <div class="footer-inner">
    <span class="f-l">© 2025 <strong>{{ site.lab.name }}</strong> · {{ site.lab.university }} · Made with Jekyll</span>
    <span class="f-r">{{ site.lab.college }}</span>
  </div>
</footer>

</body>
</html>
